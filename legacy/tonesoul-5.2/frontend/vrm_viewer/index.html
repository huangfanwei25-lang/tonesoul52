<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneSoul VRM 角色互動</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
        }

        /* 3D 角色區域 */
        #canvas-container {
            flex: 1;
            position: relative;
        }

        #vrm-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 角色名稱標籤 */
        .character-label {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.2em;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 對話面板 */
        #chat-panel {
            width: 400px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* 對話歷史 */
        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: rgba(255, 193, 7, 0.2);
            font-size: 0.9em;
            color: #ffc107;
        }

        /* 輸入區域 */
        #input-area {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1em;
            outline: none;
            transition: background 0.3s;
        }

        #user-input:focus {
            background: rgba(255, 255, 255, 0.15);
        }

        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        #send-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 表情控制 */
        #expression-controls {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .expression-label {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .expression-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .expr-btn {
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            background: transparent;
            color: #fff;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .expr-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .expr-btn.active {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        /* 載入狀態 */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div class="loader"></div>
        <div class="loading-text">載入中...</div>
    </div>

    <div id="app">
        <div id="canvas-container">
            <canvas id="vrm-canvas"></canvas>
            <div class="character-label">✨ 牧瀬紅莉栖 (Makise Kurisu)</div>
        </div>

        <div id="chat-panel">
            <div class="panel-header">
                <div class="status-dot"></div>
                <span>ToneSoul AI 對話</span>
            </div>

            <div id="chat-history">
                <div class="message system">👋 歡迎！我是小語，有什麼我可以幫你的嗎？</div>
            </div>

            <div id="expression-controls">
                <div class="expression-label">表情控制</div>
                <div class="expression-buttons">
                    <button class="expr-btn active" data-expr="neutral">😊 自然</button>
                    <button class="expr-btn" data-expr="happy">😄 開心</button>
                    <button class="expr-btn" data-expr="sad">😢 難過</button>
                    <button class="expr-btn" data-expr="angry">😠 生氣</button>
                    <button class="expr-btn" data-expr="surprised">😲 驚訝</button>
                </div>
            </div>

            <div id="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="輸入訊息..." autocomplete="off">
                    <button id="send-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 載入 Three.js 和 VRM -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.min.js"
        }
    }
    </script>

    <script type="module" src="vrm_app.js"></script>
</body>

</html>
