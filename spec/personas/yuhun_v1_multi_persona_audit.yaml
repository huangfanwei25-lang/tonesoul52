    - agent_id: "critic-evidence-1"
      role: "critic:evidence"
      vote: "revise"
      confidence: 0.82
      safety_score: 0.89
      quality_score: 0.88
      novelty_score: 0.63
      latency_ms: 1180
      token_cost: 590
    - agent_id: "advocate-human-1"
