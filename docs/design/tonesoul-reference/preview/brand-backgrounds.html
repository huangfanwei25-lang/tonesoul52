<!doctype html><html><head><meta charset="utf-8"><title>Backgrounds</title><link rel="stylesheet" href="_card.css"></head><body style="padding:0;background:#fff">
<div class="row" style="gap:0;height:180px">
  <div style="flex:1;background:#eef1f5;background-image:linear-gradient(rgba(90,142,192,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(90,142,192,0.06) 1px,transparent 1px);background-size:40px 40px;padding:16px;position:relative">
    <div style="font-family:var(--font-display);font-size:.82rem;color:#3a6b9f;letter-spacing:.06em">BLUEPRINT</div>
    <div class="mono" style="font-size:11px;color:#6b7c8d;margin-top:4px">#eef1f5 · 40-px grid · rgba(90,142,192,.06)</div>
  </div>
  <div style="flex:1;background:radial-gradient(circle at 8% 0%, rgba(52,211,153,.16), transparent 34%),radial-gradient(circle at 90% 2%, rgba(125,211,252,.16), transparent 40%),linear-gradient(180deg,#0e1629,#060912);padding:16px;position:relative">
    <div style="position:absolute;inset:0;background-image:radial-gradient(rgba(160,179,212,.18) 1px, transparent 1px);background-size:20px 20px;opacity:.9;pointer-events:none"></div>
    <div style="position:relative;font-family:var(--font-display);font-size:.82rem;color:#7dd3fc;letter-spacing:.06em">OBSIDIAN</div>
    <div class="mono" style="position:relative;font-size:11px;color:#a0b3d4;margin-top:4px">aurora radials + 20-px dot noise</div>
  </div>
</div>
</body></html>
