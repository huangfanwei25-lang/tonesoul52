<!doctype html><html><head><meta charset="utf-8"><title>Obsidian buttons</title><link rel="stylesheet" href="_card.css"></head><body class="ob">
<div class="caption" style="margin-bottom:12px">Buttons · Obsidian · 10-px radius · 600 weight</div>
<div class="row" style="align-items:center">
  <button style="border:0;border-radius:10px;padding:8px 14px;font-weight:600;font-family:var(--font-body);color:#032030;background:linear-gradient(120deg,#7dd3fc,#86efac);cursor:pointer">重新整理</button>
  <button style="border:1px solid rgba(160,179,212,0.32);border-radius:10px;padding:8px 14px;font-weight:600;font-family:var(--font-body);color:#ecf3ff;background:rgba(10,18,34,0.7);cursor:pointer">儲存</button>
  <button style="border:1px solid rgba(160,179,212,0.32);border-radius:10px;padding:8px 14px;font-weight:600;font-family:var(--font-body);color:#ecf3ff;background:rgba(10,18,34,0.7);cursor:pointer">清除</button>
  <button disabled style="border:0;border-radius:10px;padding:8px 14px;font-weight:600;font-family:var(--font-body);color:#032030;background:linear-gradient(120deg,#7dd3fc,#86efac);opacity:.65;cursor:wait">載入中</button>
</div>
</body></html>
