<!doctype html><html><head><meta charset="utf-8"><title>Blueprint Palette</title><link rel="stylesheet" href="_card.css"></head><body>
<div class="row">
  <div class="col grow" style="min-width:220px">
    <div class="caption">Primary · Steel Blue</div>
    <div style="height:56px;border-radius:6px;background:#3a6b9f;display:flex;align-items:flex-end;padding:6px 10px;color:#fff;font-family:var(--font-mono);font-size:11px">#3a6b9f · --blue-deep</div>
    <div style="height:44px;border-radius:6px;background:#5a8ec0;display:flex;align-items:flex-end;padding:6px 10px;color:#fff;font-family:var(--font-mono);font-size:11px">#5a8ec0 · --blue-mid</div>
    <div style="height:32px;border-radius:6px;background:#b8d4e8;display:flex;align-items:flex-end;padding:4px 10px;color:#2c3e50;font-family:var(--font-mono);font-size:11px">#b8d4e8 · --blue-light</div>
    <div style="height:26px;border-radius:6px;background:#dce8f2;display:flex;align-items:flex-end;padding:4px 10px;color:#2c3e50;font-family:var(--font-mono);font-size:11px">#dce8f2 · --blue-pale</div>
  </div>
  <div class="col grow" style="min-width:220px">
    <div class="caption">Surface · Text · Borders</div>
    <div style="height:56px;border-radius:6px;background:#eef1f5;border:1px solid rgba(90,142,192,0.2);display:flex;align-items:flex-end;padding:6px 10px;color:#2c3e50;font-family:var(--font-mono);font-size:11px">#eef1f5 · --bg (parchment)</div>
    <div style="height:44px;border-radius:6px;background:rgba(255,255,255,0.72);border:1px solid rgba(90,142,192,0.2);backdrop-filter:blur(8px);display:flex;align-items:flex-end;padding:6px 10px;color:#2c3e50;font-family:var(--font-mono);font-size:11px">rgba(255,255,255,.72) · --bg-card</div>
    <div style="height:32px;border-radius:6px;background:#2c3e50;display:flex;align-items:flex-end;padding:4px 10px;color:#fff;font-family:var(--font-mono);font-size:11px">#2c3e50 · --text</div>
    <div style="height:26px;border-radius:6px;background:#6b7c8d;display:flex;align-items:flex-end;padding:4px 10px;color:#fff;font-family:var(--font-mono);font-size:11px">#6b7c8d · --text-muted</div>
  </div>
</div>
</body></html>
