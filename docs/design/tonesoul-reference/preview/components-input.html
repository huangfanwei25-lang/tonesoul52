<!doctype html><html><head><meta charset="utf-8"><title>Input</title><link rel="stylesheet" href="_card.css"></head><body class="ob">
<div class="caption" style="margin-bottom:10px">Auth row · input + save/clear</div>
<div style="display:grid;grid-template-columns:1fr auto auto;gap:8px">
  <input placeholder="如果後端設定 TONESOUL_READ_API_TOKEN，請輸入 token" style="width:100%;border:1px solid rgba(160,179,212,0.28);border-radius:10px;padding:8px 10px;background:rgba(8,14,25,0.8);color:#ecf3ff;font-family:var(--font-body)">
  <button style="border:1px solid rgba(160,179,212,0.32);border-radius:10px;padding:8px 14px;font-weight:600;color:#ecf3ff;background:rgba(10,18,34,0.7);cursor:pointer">儲存</button>
  <button style="border:1px solid rgba(160,179,212,0.32);border-radius:10px;padding:8px 14px;font-weight:600;color:#ecf3ff;background:rgba(10,18,34,0.7);cursor:pointer">清除</button>
</div>
<div style="margin-top:8px;color:#a0b3d4;font-size:.8rem">未設定 token 也可使用；若讀取 API 回傳 401，再輸入 token。</div>
</body></html>
