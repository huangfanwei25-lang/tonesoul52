<!doctype html><html><head><meta charset="utf-8"><title>Obsidian Palette</title><link rel="stylesheet" href="_card.css"></head><body class="ob">
<div class="row">
  <div class="col grow" style="min-width:220px">
    <div class="caption">Surface · Deep navy</div>
    <div style="height:56px;border-radius:10px;background:#060912;border:1px solid rgba(159,178,206,0.25);display:flex;align-items:flex-end;padding:6px 10px;color:#ecf3ff;font-family:var(--font-mono);font-size:11px">#060912 · --ob-bg-0</div>
    <div style="height:44px;border-radius:10px;background:#0e1629;border:1px solid rgba(159,178,206,0.25);display:flex;align-items:flex-end;padding:6px 10px;color:#ecf3ff;font-family:var(--font-mono);font-size:11px">#0e1629 · --ob-bg-1</div>
    <div style="height:32px;border-radius:10px;background:rgba(16,28,52,0.70);border:1px solid rgba(159,178,206,0.25);backdrop-filter:blur(8px);display:flex;align-items:flex-end;padding:4px 10px;color:#ecf3ff;font-family:var(--font-mono);font-size:11px">rgba(16,28,52,.7) · --ob-panel</div>
    <div style="height:26px;border-radius:10px;background:rgba(8,14,28,0.58);border:1px solid rgba(159,178,206,0.18);display:flex;align-items:flex-end;padding:4px 10px;color:#ecf3ff;font-family:var(--font-mono);font-size:11px">rgba(8,14,28,.58) · --ob-card</div>
  </div>
  <div class="col grow" style="min-width:220px">
    <div class="caption">Accents · cyan / mint / warn / danger</div>
    <div style="height:40px;border-radius:10px;background:linear-gradient(130deg,#7dd3fc,#86efac);display:flex;align-items:flex-end;padding:4px 10px;color:#062233;font-family:var(--font-mono);font-size:11px;font-weight:600">linear-gradient(130°, #7dd3fc → #86efac)</div>
    <div style="height:34px;border-radius:10px;background:#7dd3fc;display:flex;align-items:flex-end;padding:4px 10px;color:#062233;font-family:var(--font-mono);font-size:11px">#7dd3fc · --ob-primary (T)</div>
    <div style="height:28px;border-radius:10px;background:#34d399;display:flex;align-items:flex-end;padding:4px 10px;color:#062233;font-family:var(--font-mono);font-size:11px">#34d399 · --ob-success</div>
    <div style="height:28px;border-radius:10px;background:#fbbf24;display:flex;align-items:flex-end;padding:4px 10px;color:#062233;font-family:var(--font-mono);font-size:11px">#fbbf24 · --ob-warn</div>
    <div style="height:28px;border-radius:10px;background:#fb7185;display:flex;align-items:flex-end;padding:4px 10px;color:#fff;font-family:var(--font-mono);font-size:11px">#fb7185 · --ob-danger</div>
  </div>
</div>
</body></html>
