[pytest]
python_files = test_*.py
cache_dir = legacy/tonesoul-5.2/.pytest_cache
addopts = -p no:cacheprovider --ignore=legacy --ignore=src/core --ignore=舊檔案 --ignore=tests/legacy -v

# Only collect tests from these directories
testpaths = tests

# Asyncio support
asyncio_mode = auto
markers =
    asyncio: mark test as asyncio

# Explicitly ignore legacy paths to avoid ImportPathMismatchError
norecursedirs = 
    legacy
    legacy/*
    legacy/archives
    legacy/archives/*
    tests/legacy
    src/core
    舊檔案
    .venv
    .git
    __pycache__
    *.egg-info
