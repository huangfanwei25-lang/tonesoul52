name: Validate YuHun Vows

on: [pull_request, push]

jobs:
  validate-vows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate Vows
        id: validate
        run: python scripts/validate_vows.py .vows/chain.yml .persona.json

      - name: Report
        if: ${{ always() }}
        run: cat artifacts/report.md