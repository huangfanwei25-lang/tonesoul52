name: 語魂誓語驗證流程

on:
  pull_request:
    paths:
      - '.vows/**/*.yml'

jobs:
  validate-vows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run validation script
        run: python scripts/validate_vows.py
