name: Dual-Track Boundary

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:
    inputs:
      allow_private_paths:
        description: "Break-glass bypass (logs warning, does not block)."
        type: boolean
        required: true
        default: false

permissions:
  contents: read

concurrency:
  group: tonesoul-dual-track-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Dual-Track Boundary Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve changed files
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            if ! git cat-file -t "$base_sha" >/dev/null 2>&1; then
              git fetch origin "${{ github.base_ref }}" --depth=200
            fi
            if ! git cat-file -t "$head_sha" >/dev/null 2>&1; then
              git fetch origin "${{ github.event.pull_request.head.ref }}" --depth=200
            fi
            git -c core.quotepath=off diff --name-status --diff-filter=ACMRD "$base_sha...$head_sha" > changed_files.txt
          elif [ "${{ github.event_name }}" = "push" ]; then
            before_sha="${{ github.event.before }}"
            if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ] && git cat-file -t "$before_sha" >/dev/null 2>&1; then
              git -c core.quotepath=off diff --name-status --diff-filter=ACMRD "$before_sha...HEAD" > changed_files.txt
            else
              # Fallback: before_sha missing (force-push) or initial push
              echo "::warning::before_sha ($before_sha) not found in history (force-push?). Falling back to HEAD-only diff."
              git -c core.quotepath=off show --pretty=format: --name-status --diff-filter=ACMRD HEAD > changed_files.txt
            fi
          else
            git -c core.quotepath=off show --pretty=format: --name-status --diff-filter=ACMRD HEAD > changed_files.txt
          fi
          wc -l changed_files.txt

      - name: Run dual-track boundary check (blocking)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.allow_private_paths != 'true'
        run: |
          python scripts/verify_dual_track_boundary.py --strict --changed-file-list changed_files.txt

      - name: Run dual-track boundary check (break-glass)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.allow_private_paths == 'true'
        run: |
          python scripts/verify_dual_track_boundary.py --strict --changed-file-list changed_files.txt --allow-private-paths

      - name: Upload dual-track artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dual-track-boundary-${{ github.run_id }}
          path: |
            changed_files.txt
            docs/status/dual_track_boundary_latest.json
            docs/status/dual_track_boundary_latest.md
          if-no-files-found: error
          retention-days: 90
