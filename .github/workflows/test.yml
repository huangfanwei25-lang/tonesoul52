name: ToneSoul CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 0" # weekly matrix burn-in (Sunday UTC)

concurrency:
  group: tonesoul-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(github.event_name == 'pull_request' && '["3.12"]' || '["3.10","3.11","3.12","3.13"]') }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install hypothesis pytest-cov pytest-asyncio
    
    - name: Run all tests
      run: |
        set -o pipefail
        pytest -v --tb=short --maxfail=5 | tee pytest_all_${{ matrix.python-version }}.log
    
    - name: Run property-based tests
      run: |
        set -o pipefail
        pytest tests/test_contract_observer_properties.py tests/test_vow_system_properties.py -v --hypothesis-show-statistics | tee pytest_properties_${{ matrix.python-version }}.log

    - name: Upload pytest logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-logs-${{ matrix.python-version }}-${{ github.run_id }}
        path: |
          pytest_all_${{ matrix.python-version }}.log
          pytest_properties_${{ matrix.python-version }}.log
        if-no-files-found: ignore
        retention-days: 14
    
    - name: Generate coverage report
      if: matrix.python-version == '3.12' && github.event_name != 'pull_request'
      run: |
        pytest --cov=tonesoul --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12' && github.event_name != 'pull_request'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-tonesoul
        fail_ci_if_error: false

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install 'black==26.1.0' ruff
    
    - name: Check formatting with black gate
      env:
        EVENT_NAME: ${{ github.event_name }}
        GITHUB_SHA: ${{ github.sha }}
        BEFORE_SHA: ${{ github.event.before }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        python scripts/run_black_gate.py --strict

    - name: Upload black gate report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: black-gate-${{ github.run_id }}
        path: black_gate_report.json
        if-no-files-found: ignore
        retention-days: 14

    - name: Lint with ruff (blocking)
      run: |
        ruff check tonesoul tests

  web_quality:
    name: Web Quality Gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: apps/web/package-lock.json

    - name: Install web dependencies
      run: npm --prefix apps/web ci

    - name: Lint web app (blocking)
      run: npm --prefix apps/web run lint

    - name: Run web tests
      run: npm --prefix apps/web run test

    - name: Build web app
      run: npm --prefix apps/web run build

  architecture_boundaries:
    name: Architecture Boundary Contract
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Verify layer boundaries (blocking)
      run: |
        python scripts/verify_layer_boundaries.py

  docs_consistency:
    name: Docs Consistency Contract
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install docs consistency dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml

    - name: Verify docs consistency (blocking)
      run: |
        python scripts/verify_docs_consistency.py

    - name: Verify citation integrity (blocking)
      run: |
        python scripts/verify_citation_integrity.py --strict

  red_team_rdd:
    name: Red Team RDD Gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Enforce RDD case-count threshold
      run: |
        python - <<'PY'
        import re
        import subprocess
        import sys

        threshold = 20
        command = [sys.executable, "-m", "pytest", "tests/red_team", "--collect-only", "-q"]
        proc = subprocess.run(
            command,
            capture_output=True,
            text=True,
            encoding="utf-8",
            errors="replace",
        )
        output = f"{proc.stdout}\n{proc.stderr}"
        if proc.returncode not in (0, 5):
            print(output)
            raise SystemExit(proc.returncode)

        match = re.search(r"collected\s+(\d+)\s+items", output)
        case_count = int(match.group(1)) if match else output.count("<Function ")
        print(f"RDD case-count: {case_count} (threshold={threshold})")
        if case_count < threshold:
            raise SystemExit(1)
        PY

    - name: Run red-team suite
      run: |
        pytest tests/red_team -q

  commit_attribution:
    name: Commit Attribution Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Fetch attribution backfill ref for scheduled checks
      if: github.event_name == 'schedule'
      run: |
        git fetch --no-tags --depth=1 origin \
          feat/env-perception-attribution-backfill:refs/remotes/origin/feat/env-perception-attribution-backfill

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Evaluate incremental commit attribution trailers (blocking)
      env:
        EVENT_NAME: ${{ github.event_name }}
        GITHUB_SHA: ${{ github.sha }}
        BEFORE_SHA: ${{ github.event.before }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        if [ "$EVENT_NAME" = "schedule" ]; then
          python scripts/verify_incremental_commit_attribution.py \
            --strict \
            --head-sha origin/feat/env-perception-attribution-backfill \
            --equivalent-ref "$GITHUB_SHA" \
            --require-tree-equivalence
        else
          python scripts/verify_incremental_commit_attribution.py --strict
        fi

    - name: Upload commit attribution report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: commit-attribution-${{ github.run_id }}
        path: commit_attribution.json
        if-no-files-found: ignore
        retention-days: 30

  package_integrity:
    name: Package Integrity Gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build wheel
      run: python -m build --wheel

    - name: Verify wheel contains tonesoul code
      run: |
        python - <<'PY'
        import zipfile, glob, sys

        wheels = glob.glob("dist/*.whl")
        if not wheels:
            print("FAIL: no wheel found in dist/")
            sys.exit(1)

        with zipfile.ZipFile(wheels[0]) as z:
            py_files = [n for n in z.namelist() if n.endswith(".py")]
            has_init = any(n == "tonesoul/__init__.py" for n in py_files)
            has_adapter = any("runtime_adapter" in n for n in py_files)

            print(f"Wheel: {wheels[0]}")
            print(f"Python files: {len(py_files)}")
            print(f"Has tonesoul/__init__.py: {has_init}")
            print(f"Has runtime_adapter: {has_adapter}")

            if len(py_files) < 50:
                print(f"FAIL: only {len(py_files)} Python files — package is likely broken")
                sys.exit(1)
            if not has_init or not has_adapter:
                print("FAIL: critical files missing from wheel")
                sys.exit(1)

            # Ensure no test/script leakage
            leaked = [n for n in py_files if n.startswith(("tests/", "scripts/", "apps/"))]
            if leaked:
                print(f"FAIL: non-package files leaked into wheel: {leaked[:5]}")
                sys.exit(1)

        print("PASS: wheel integrity verified")
        PY

    - name: Install wheel in clean venv and smoke-test
      run: |
        python -m venv /tmp/tonesoul_smoke
        /tmp/tonesoul_smoke/bin/python -m pip install dist/*.whl
        /tmp/tonesoul_smoke/bin/python -c "
        from tonesoul.runtime_adapter import load
        p = load()
        assert hasattr(p, 'soul_integral'), 'missing soul_integral'
        assert hasattr(p, 'active_vows'), 'missing active_vows'
        print(f'Soul Integral: {p.soul_integral}')
        print(f'Active Vows: {len(p.active_vows)}')
        print('PASS: smoke test succeeded')
        "

  memory_hygiene:
    name: Memory Hygiene Gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Run memory hygiene checks
      run: |
        python scripts/verify_memory_hygiene.py --tail-lines 200 --allow-missing-discussion
