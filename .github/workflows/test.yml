name: ToneSoul CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install hypothesis pytest-cov pytest-asyncio
    
    - name: Run all tests
      run: |
        pytest -v --tb=short --maxfail=5
    
    - name: Run property-based tests
      run: |
        pytest tests/test_contract_observer_properties.py tests/test_unified_core_properties.py tests/test_vow_system_properties.py -v --hypothesis-show-statistics
    
    - name: Generate coverage report
      if: matrix.python-version == '3.12'
      run: |
        pytest --cov=tonesoul --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-tonesoul
        fail_ci_if_error: false

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install 'black>=25.1.0' ruff
    
    - name: Run critical lint gate (blocking)
      run: |
        python -m ruff check tonesoul tests --select E9,F63,F7,F82
    
    - name: Check formatting with black (advisory)
      continue-on-error: true
      run: |
        black --check --diff --line-length 100 tonesoul tests

    - name: Lint with ruff (advisory)
      continue-on-error: true
      run: |
        ruff check tonesoul tests
