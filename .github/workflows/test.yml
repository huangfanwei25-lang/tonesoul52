name: ToneSoul CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install hypothesis pytest-cov pytest-asyncio
    
    - name: Run all tests
      run: |
        set -o pipefail
        pytest -v --tb=short --maxfail=5 | tee pytest_all_${{ matrix.python-version }}.log
    
    - name: Run property-based tests
      run: |
        set -o pipefail
        pytest tests/test_contract_observer_properties.py tests/test_unified_core_properties.py tests/test_vow_system_properties.py -v --hypothesis-show-statistics | tee pytest_properties_${{ matrix.python-version }}.log

    - name: Upload pytest logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-logs-${{ matrix.python-version }}-${{ github.run_id }}
        path: |
          pytest_all_${{ matrix.python-version }}.log
          pytest_properties_${{ matrix.python-version }}.log
        if-no-files-found: ignore
        retention-days: 14
    
    - name: Generate coverage report
      if: matrix.python-version == '3.12'
      run: |
        pytest --cov=tonesoul --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-tonesoul
        fail_ci_if_error: false

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install 'black==26.1.0' ruff
    
    - name: Check formatting with black (blocking)
      run: |
        black --check --diff --line-length 100 tonesoul tests

    - name: Lint with ruff (blocking)
      run: |
        ruff check tonesoul tests

  web_quality:
    name: Web Quality Gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: apps/web/package-lock.json

    - name: Install web dependencies
      run: npm --prefix apps/web ci

    - name: Lint web app (blocking)
      run: npm --prefix apps/web run lint

    - name: Run web tests
      run: npm --prefix apps/web run test

    - name: Build web app
      run: npm --prefix apps/web run build

  architecture_boundaries:
    name: Architecture Boundary Contract
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Verify layer boundaries (blocking)
      run: |
        python scripts/verify_layer_boundaries.py

  docs_consistency:
    name: Docs Consistency Contract
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install docs consistency dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml

    - name: Verify docs consistency (blocking)
      run: |
        python scripts/verify_docs_consistency.py

  red_team_rdd:
    name: Red Team RDD Gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Enforce RDD case-count threshold
      run: |
        python - <<'PY'
        import re
        import subprocess
        import sys

        threshold = 20
        command = [sys.executable, "-m", "pytest", "tests/red_team", "--collect-only", "-q"]
        proc = subprocess.run(
            command,
            capture_output=True,
            text=True,
            encoding="utf-8",
            errors="replace",
        )
        output = f"{proc.stdout}\n{proc.stderr}"
        if proc.returncode not in (0, 5):
            print(output)
            raise SystemExit(proc.returncode)

        match = re.search(r"collected\s+(\d+)\s+items", output)
        case_count = int(match.group(1)) if match else output.count("<Function ")
        print(f"RDD case-count: {case_count} (threshold={threshold})")
        if case_count < threshold:
            raise SystemExit(1)
        PY

    - name: Run red-team suite
      run: |
        pytest tests/red_team -q

  commit_attribution:
    name: Commit Attribution Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Evaluate incremental commit attribution trailers (blocking)
      env:
        EVENT_NAME: ${{ github.event_name }}
        GITHUB_SHA: ${{ github.sha }}
        BEFORE_SHA: ${{ github.event.before }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        python - <<'PY'
        import json
        import os
        from pathlib import Path
        import subprocess
        import sys

        def _rev_list(spec: str) -> list[str]:
            proc = subprocess.run(
                ["git", "rev-list", "--reverse", spec],
                capture_output=True,
                text=True,
                encoding="utf-8",
                errors="replace",
                check=False,
            )
            if proc.returncode != 0:
                raise SystemExit(proc.stderr.strip() or f"failed to list revisions for {spec}")
            return [line.strip() for line in proc.stdout.splitlines() if line.strip()]

        event_name = os.environ.get("EVENT_NAME", "").strip()
        head_sha = os.environ.get("GITHUB_SHA", "HEAD").strip() or "HEAD"

        range_spec = None
        revisions: list[str] = []
        if event_name == "pull_request":
            base_sha = os.environ.get("PR_BASE_SHA", "").strip()
            pr_head_sha = os.environ.get("PR_HEAD_SHA", "").strip() or head_sha
            if base_sha:
                range_spec = f"{base_sha}..{pr_head_sha}"
                revisions = _rev_list(range_spec)
            else:
                revisions = [pr_head_sha]
        elif event_name == "push":
            before_sha = os.environ.get("BEFORE_SHA", "").strip()
            # Guard: verify before_sha exists (may be orphaned after force-push)
            sha_exists = False
            if before_sha and before_sha != "0000000000000000000000000000000000000000":
                check = subprocess.run(
                    ["git", "cat-file", "-t", before_sha],
                    capture_output=True, check=False,
                )
                sha_exists = check.returncode == 0
            if sha_exists:
                range_spec = f"{before_sha}..{head_sha}"
                revisions = _rev_list(range_spec)
            else:
                revisions = [head_sha]
        else:
            revisions = [head_sha]

        if not revisions:
            revisions = [head_sha]

        results = []
        missing = []
        for revision in revisions:
            proc = subprocess.run(
                [sys.executable, "scripts/verify_commit_attribution.py", "--rev", revision],
                capture_output=True,
                text=True,
                encoding="utf-8",
                errors="replace",
                check=False,
            )
            if proc.returncode != 0:
                raise SystemExit(proc.stderr.strip() or proc.stdout.strip() or "attribution check failed")

            payload = json.loads(proc.stdout)
            results.append(payload)
            if not payload.get("ok", False):
                missing.append({"rev": revision, "summary": payload.get("summary", "")})

        report = {
            "event_name": event_name,
            "mode": "incremental",
            "range_spec": range_spec,
            "checked_revisions": revisions,
            "checked_count": len(revisions),
            "missing_count": len(missing),
            "missing": missing,
            "ok": not missing,
            "results": results,
        }
        Path("commit_attribution.json").write_text(
            json.dumps(report, ensure_ascii=False, indent=2),
            encoding="utf-8",
        )
        print(json.dumps(report, ensure_ascii=False, indent=2))
        if missing:
            print("::error::Missing Agent/Trace-Topic trailers in incremental commits.")
            print("::error::Add commit trailers, for example:")
            print("::error::Agent: Codex")
            print("::error::Trace-Topic: <topic-name>")
            raise SystemExit(1)
        PY

    - name: Upload commit attribution report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: commit-attribution-${{ github.run_id }}
        path: commit_attribution.json
        if-no-files-found: ignore
        retention-days: 30

  memory_hygiene:
    name: Memory Hygiene Gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Run memory hygiene checks
      run: |
        python scripts/verify_memory_hygiene.py --tail-lines 200 --allow-missing-discussion
