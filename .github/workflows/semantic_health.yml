name: Semantic Health

on:
  schedule:
    - cron: '0 0 * * 1'  # weekly on Monday UTC
  workflow_dispatch:
  push:
    branches: [master, main, dev]
    paths:
      - "tonesoul/**"
      - "tests/test_pre_output_council.py"
      - "tests/test_verdict.py"
      - "tests/test_coherence.py"
      - "tests/test_guardian.py"
      - "AXIOMS.json"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/semantic_health.yml"
  pull_request:
    branches: [master, main, dev]
    paths:
      - "tonesoul/**"
      - "tests/test_pre_output_council.py"
      - "tests/test_verdict.py"
      - "tests/test_coherence.py"
      - "tests/test_guardian.py"
      - "AXIOMS.json"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/semantic_health.yml"

concurrency:
  group: tonesoul-semantic-health-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Council Tests (blocking)
        run: |
          set -o pipefail
          export PYTHONPATH=.
          pytest tests/test_pre_output_council.py tests/test_verdict.py tests/test_coherence.py tests/test_guardian.py -v --tb=short | tee semantic_council.log

      - name: Verify AXIOMS.json integrity
        run: |
          python -c "
          import json
          from pathlib import Path
          
          path = Path('AXIOMS.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          
          # Basic structure checks
          assert data, 'AXIOMS.json must not be empty'
          assert isinstance(data, dict), 'AXIOMS.json root must be an object'
          
          # Check axioms array exists and has entries
          assert 'axioms' in data, 'AXIOMS.json must have an axioms array'
          axioms = data['axioms']
          assert isinstance(axioms, list), 'axioms must be an array'
          assert len(axioms) > 0, 'axioms array must have at least one entry'
          
          # Each axiom should have required fields
          for i, axiom in enumerate(axioms):
              assert 'id' in axiom, f'Axiom {i} needs an id'
              assert 'name' in axiom, f'Axiom {i} needs a name'
              assert 'fol' in axiom, f'Axiom {i} needs a FOL expression'
              assert 'natural' in axiom, f'Axiom {i} needs a natural language description'
          
          print(f'AXIOMS.json validation passed! ({len(axioms)} axioms verified)')
          "

      - name: Upload semantic health logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-health-${{ github.run_id }}
          path: semantic_council.log
          if-no-files-found: ignore
          retention-days: 14
