name: Persona Swarm

on:
  schedule:
    - cron: "0 2 * * 2" # weekly on Tuesday UTC
  workflow_dispatch:
    inputs:
      strict:
        description: "Run readiness gate in strict mode."
        type: boolean
        required: true
        default: true
      input_path:
        description: "Optional input JSON path for swarm signals."
        type: string
        required: false
  push:
    branches: [master, main, dev]
    paths:
      - "tonesoul/**"
      - "scripts/run_persona_swarm_framework.py"
      - "scripts/run_persona_swarm_dispatch.py"
      - "tests/test_swarm_framework.py"
      - "tests/test_run_persona_swarm_framework.py"
      - "tests/test_workflow_contracts.py"
      - "spec/personas/**"
      - "docs/status/**"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/persona_swarm.yml"
  pull_request:
    branches: [master, main, dev]
    paths:
      - "tonesoul/**"
      - "scripts/run_persona_swarm_framework.py"
      - "scripts/run_persona_swarm_dispatch.py"
      - "tests/test_swarm_framework.py"
      - "tests/test_run_persona_swarm_framework.py"
      - "tests/test_workflow_contracts.py"
      - "spec/personas/**"
      - "docs/status/**"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/persona_swarm.yml"

permissions:
  contents: read

concurrency:
  group: tonesoul-persona-swarm-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run persona swarm (blocking, push/pr default)
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -o pipefail
          python scripts/run_persona_swarm_framework.py --strict | tee persona_swarm.log

      - name: Run persona swarm (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          TS_SWARM_STRICT: ${{ github.event.inputs.strict }}
          TS_SWARM_INPUT_PATH: ${{ github.event.inputs.input_path }}
        run: |
          set -o pipefail
          python scripts/run_persona_swarm_dispatch.py | tee persona_swarm.log

      - name: Upload persona swarm artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persona-swarm-${{ github.run_id }}
          path: |
            docs/status/persona_swarm_framework_latest.json
            persona_swarm.log
          if-no-files-found: error
          retention-days: 30
