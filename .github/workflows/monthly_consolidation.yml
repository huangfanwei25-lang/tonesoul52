name: Monthly Consolidation

on:
  schedule:
    - cron: "30 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  consolidation:
    name: Monthly 7D Consolidation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install hypothesis pytest-cov pytest-asyncio

      - name: Run monthly consolidation (blocking)
        run: |
          python scripts/run_monthly_consolidation.py --strict --allow-missing-discussion

      - name: Upload status artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-consolidation-status-${{ github.run_id }}
          path: |
            docs/status/7d_snapshot.json
            docs/status/monthly_consolidation_report.json
          if-no-files-found: error
          retention-days: 90
