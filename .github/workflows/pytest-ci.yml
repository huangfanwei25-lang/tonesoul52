name: Pytest CI

on:
  push:
    branches: [main, master]
    paths:
      - "tonesoul/**"
      - "tests/**"
      - "scripts/**"
      - "law/**"
      - "AXIOMS.json"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/pytest-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "tonesoul/**"
      - "tests/**"
      - "scripts/**"
      - "law/**"
      - "AXIOMS.json"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/pytest-ci.yml"
  workflow_dispatch:

concurrency:
  group: tonesoul-pytest-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Run pytest (blocking)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify citation integrity (blocking)
        run: |
          python scripts/verify_citation_integrity.py --strict

      - name: Run pytest (blocking)
        run: |
          set -o pipefail
          pytest -q --tb=short | tee pytest_ci.log

      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-ci-${{ github.run_id }}
          path: pytest_ci.log
          if-no-files-found: ignore
          retention-days: 14
