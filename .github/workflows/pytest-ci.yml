name: Pytest CI (Manual Focused Rerun)

on:
  # Focused Python rerun lane. Automatic Python gating lives in test.yml.
  workflow_dispatch:

concurrency:
  group: tonesoul-pytest-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Run pytest (blocking)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify citation integrity (blocking)
        run: |
          python scripts/verify_citation_integrity.py --strict

      - name: Run ruff (blocking)
        run: |
          ruff check tonesoul tests

      - name: Run pytest (blocking)
        run: |
          set -o pipefail
          pytest tests/ -x --tb=short -q | tee pytest_ci.log

      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-ci-${{ github.run_id }}
          path: pytest_ci.log
          if-no-files-found: ignore
          retention-days: 14
