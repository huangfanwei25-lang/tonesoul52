name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Verify core imports
        run: |
          export PYTHONPATH=.
          python -c "from tonesoul.tsr_metrics import score; print('TSR OK')"
          python -c "from tonesoul.poav import score; print('POAV OK')"
          python -c "from tonesoul.vow_system import VowEnforcer; print('VowSystem OK')"
          python -c "from tonesoul.time_island import TimeIsland; print('TimeIsland OK')"
      - name: Run pytest (if tests exist)
        run: |
          if [ -d tests ]; then python -m pytest tests/ -v --tb=short || true; fi
      - name: Validate JSON schemas
        run: |
          python -c "import json; json.load(open('AXIOMS.json'))"

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lint tools
        run: pip install flake8
      - name: Run flake8 (warnings only)
        run: python -m flake8 tonesoul/ --max-line-length=150 --ignore=E501,W503,W293,E302,E305 --count || true
