name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Verify core imports
        run: |
          export PYTHONPATH=.
          python -c "from tonesoul.tsr_metrics import score; print('TSR OK')"
          python -c "from tonesoul.poav import score; print('POAV OK')"
          python -c "from tonesoul.vow_system import VowEnforcer; print('VowSystem OK')"
          python -c "from tonesoul.time_island import TimeIsland; print('TimeIsland OK')"
      - name: Run tests with coverage
        run: |
          export PYTHONPATH=.
          pip install pytest-cov
          pytest tests/ --cov=tonesoul --cov-report=xml --cov-report=html -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
      - name: Validate JSON schemas
        run: |
          python -c "import json; json.load(open('AXIOMS.json', encoding='utf-8'))"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff flake8
      - name: Run critical lint gate (blocking)
        run: |
          python -m ruff check tonesoul tests --select E9,F63,F7,F82
      - name: Run flake8 snapshot (advisory)
        continue-on-error: true
        run: |
          python -m flake8 tonesoul/ --max-line-length=150 --ignore=E501,W503,W293,E302,E305 --count

  web_api_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jieba
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Build web app
        run: npm --prefix apps/web run build

      - name: Run integrated web+backend smoke
        env:
          TONESOUL_BACKEND_URL: http://127.0.0.1:5000
        run: |
          set -euo pipefail

          python apps/api/server.py > backend.log 2>&1 &
          BACK_PID=$!
          npm --prefix apps/web run start -- --port 3000 > web.log 2>&1 &
          WEB_PID=$!

          cleanup() {
            kill "$WEB_PID" "$BACK_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          python - <<'PY'
          import sys
          import time
          import requests

          def wait_get(url: str, timeout_sec: int = 60) -> None:
              deadline = time.time() + timeout_sec
              while time.time() < deadline:
                  try:
                      r = requests.get(url, timeout=2)
                      if r.status_code < 500:
                          return
                  except Exception:
                      pass
                  time.sleep(1)
              print(f"timeout waiting for {url}", file=sys.stderr)
              sys.exit(1)

          def wait_post(url: str, payload: dict, timeout_sec: int = 120) -> None:
              deadline = time.time() + timeout_sec
              while time.time() < deadline:
                  try:
                      r = requests.post(url, json=payload, timeout=2)
                      if r.status_code < 500:
                          return
                  except Exception:
                      pass
                  time.sleep(1)
              print(f"timeout waiting for {url}", file=sys.stderr)
              sys.exit(1)

          wait_get("http://127.0.0.1:5000/api/health")
          wait_post("http://127.0.0.1:3000/api/conversation", {"session_id": "ci_ready"})
          PY

          if ! python scripts/verify_web_api.py --web-base http://127.0.0.1:3000 --api-base http://127.0.0.1:5000 --require-backend --timeout 40; then
            echo "=== backend.log ==="
            cat backend.log || true
            echo "=== web.log ==="
            cat web.log || true
            exit 1
          fi
