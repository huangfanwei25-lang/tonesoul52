name: Repo Healthcheck

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:
    inputs:
      include_sdh:
        description: "Run SDH live smoke checks (requires reachable web/api)."
        type: boolean
        required: true
        default: false
      web_base:
        description: "Optional web base for SDH, e.g. http://127.0.0.1:3002"
        type: string
        required: false
      api_base:
        description: "Optional api base for SDH, e.g. http://127.0.0.1:5001"
        type: string
        required: false
      sdh_timeout:
        description: "Optional SDH timeout seconds."
        type: string
        required: false
      check_council_modes:
        description: "Check council mode switches during SDH smoke."
        type: boolean
        required: true
        default: true

permissions:
  contents: read

jobs:
  healthcheck:
    name: Repository Healthcheck
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install hypothesis pytest-cov pytest-asyncio

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Run repository healthcheck (blocking, push/pr default)
        if: github.event_name != 'workflow_dispatch'
        run: |
          python scripts/run_repo_healthcheck.py --strict --allow-missing-discussion

      - name: Run repository healthcheck (blocking, workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          CMD=(python scripts/run_repo_healthcheck.py --strict --allow-missing-discussion)

          if [[ -n "${{ github.event.inputs.sdh_timeout }}" ]]; then
            if ! [[ "${{ github.event.inputs.sdh_timeout }}" =~ ^[0-9]+$ ]] || [[ "${{ github.event.inputs.sdh_timeout }}" -lt 1 ]]; then
              echo "::error::sdh_timeout must be a positive integer. got='${{ github.event.inputs.sdh_timeout }}'"
              exit 1
            fi
          fi

          if [[ "${{ github.event.inputs.include_sdh }}" == "true" ]]; then
            if [[ -n "${{ github.event.inputs.web_base }}" && -z "${{ github.event.inputs.api_base }}" ]]; then
              echo "::warning::include_sdh=true and web_base is set but api_base is empty; api_base will fallback to verify_7d default."
            fi
            if [[ -z "${{ github.event.inputs.web_base }}" && -n "${{ github.event.inputs.api_base }}" ]]; then
              echo "::warning::include_sdh=true and api_base is set but web_base is empty; web_base will fallback to verify_7d default."
            fi
            CMD+=(--include-sdh)

            if [[ "${{ github.event.inputs.check_council_modes }}" == "false" ]]; then
              CMD+=(--no-check-council-modes)
            else
              CMD+=(--check-council-modes)
            fi

            if [[ -n "${{ github.event.inputs.web_base }}" ]]; then
              CMD+=(--web-base "${{ github.event.inputs.web_base }}")
            fi
            if [[ -n "${{ github.event.inputs.api_base }}" ]]; then
              CMD+=(--api-base "${{ github.event.inputs.api_base }}")
            fi
            if [[ -n "${{ github.event.inputs.sdh_timeout }}" ]]; then
              CMD+=(--sdh-timeout "${{ github.event.inputs.sdh_timeout }}")
            fi
          else
            if [[ -n "${{ github.event.inputs.web_base }}" || -n "${{ github.event.inputs.api_base }}" || -n "${{ github.event.inputs.sdh_timeout }}" ]]; then
              echo "::warning::SDH inputs were provided but include_sdh=false; web/api/timeout inputs will be ignored."
            fi
          fi

          "${CMD[@]}"

      - name: Upload healthcheck artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-healthcheck-status-${{ github.run_id }}
          path: |
            docs/status/repo_healthcheck_latest.json
            docs/status/repo_healthcheck_latest.md
          if-no-files-found: error
          retention-days: 90
