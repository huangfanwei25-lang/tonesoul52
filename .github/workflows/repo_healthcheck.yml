name: Repo Healthcheck

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  healthcheck:
    name: Repository Healthcheck
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install hypothesis pytest-cov pytest-asyncio

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Run repository healthcheck (blocking)
        run: |
          python scripts/run_repo_healthcheck.py --strict --allow-missing-discussion

      - name: Upload healthcheck artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-healthcheck-status-${{ github.run_id }}
          path: |
            docs/status/repo_healthcheck_latest.json
            docs/status/repo_healthcheck_latest.md
          if-no-files-found: error
          retention-days: 90
