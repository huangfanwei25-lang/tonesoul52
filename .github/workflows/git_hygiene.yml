name: Git Hygiene

on:
  schedule:
    - cron: "15 3 * * 1"
  push:
    branches: [master, dev]
    paths:
      - ".gitignore"
      - "scripts/verify_git_hygiene.py"
      - "docs/status/**"
      - ".github/workflows/git_hygiene.yml"
  pull_request:
    branches: [master, dev]
    paths:
      - ".gitignore"
      - "scripts/verify_git_hygiene.py"
      - "docs/status/**"
      - ".github/workflows/git_hygiene.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tonesoul-git-hygiene-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: Git Hygiene Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run git hygiene snapshot (blocking)
        run: |
          python scripts/verify_git_hygiene.py --strict --max-tracked-ignored 28

      - name: Upload git hygiene artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git-hygiene-status-${{ github.run_id }}
          path: |
            docs/status/git_hygiene_latest.json
            docs/status/git_hygiene_latest.md
          if-no-files-found: error
          retention-days: 90
