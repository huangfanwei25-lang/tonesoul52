name: Deploy public site to GitHub Pages

# The Pages artifact is deliberately player-facing only:
#   /          -> site/         (public landing page)
#   /theater/  -> site/theater/ (岔軌之城)
#
# docs/demo_ui/ remains a repository/operator surface and is not copied into
# this public artifact. The game ships its own lossy player projection rather
# than an audit console or a raw council transcript.

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy_a.outputs.page_url || steps.deploy_b.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble player-facing Pages site
        run: |
          mkdir -p _site
          cp -r site/. _site/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # actions/deploy-pages transiently fails on GitHub-side jitter (observed
      # 2026-07-05/06: repeated 'merged != live', manual re-dispatch to heal).
      # Native two-attempt retry — no third-party action in this privileged
      # (pages:write / id-token:write) workflow. Attempt 1 is non-fatal; the
      # retry runs ONLY if it failed; a real double-failure still goes red.
      # Both reuse the artifact from upload-pages-artifact.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_a
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Pause before retry
        if: steps.deploy_a.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (retry)
        id: deploy_b
        if: steps.deploy_a.outcome == 'failure'
        uses: actions/deploy-pages@v4
