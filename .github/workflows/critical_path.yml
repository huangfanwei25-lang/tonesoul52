name: Critical Path Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pyyaml

      - name: Verify core imports
        run: |
          export PYTHONPATH=.
          python -c "from tonesoul.unified_core import UnifiedCore; print('UnifiedCore OK')"
          python -c "from tonesoul.council import PreOutputCouncil; print('PreOutputCouncil OK')"
          python -c "from tonesoul.poav import score; print('POAV OK')"
          python -c "from tonesoul.vow_system import VowEnforcer; print('VowEnforcer OK')"

      - name: Run critical path smoke tests
        run: |
          export PYTHONPATH=.
          pytest tests/test_guardian.py tests/test_verdict.py tests/test_poav.py tests/test_vow_system.py -v --tb=short
