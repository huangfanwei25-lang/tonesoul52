name: 岔軌之城軌痕提交(自願)
description: 把你在岔軌之城留下的責任紀錄,自願提交給作者。經審核後才可能收錄進公開資料集。
title: "軌痕提交:"
labels: ["theater-trace", "human-lane"]
body:
  - type: markdown
    attributes:
      value: |
        ## 提交之前,把話說清楚

        - 這是**自願**提交:遊戲本身永遠不會自動上傳任何東西。
        - 提交後由作者與審核程序(門神)人工檢視;**通過審核才可能**以 **CC BY 4.0**
          收錄進「責任痕跡資料集」的 human lane——提交≠自動收錄。
        - 你的軌痕 JSON 裡有一組**撤回碼**:憑它你可以隨時要求移除
          (刪除這個 Issue 即撤回未收錄的提交;已收錄的憑撤回碼在資料集下一版移除)。
        - 你的 GitHub 帳號會與這筆提交關聯;若想匿名化理由原文,勾選下方選項。
  - type: checkboxes
    id: consent
    attributes:
      label: 同意聲明(必勾)
      options:
        - label: 我自願提交這份軌痕,並理解「提交 ≠ 自動收錄」,收錄與否由審核決定。
          required: true
        - label: 我理解若獲收錄,內容將以 CC BY 4.0 授權公開。
          required: true
        - label: 我已保存軌痕 JSON 中的撤回碼,並理解憑它可要求移除。
          required: true
  - type: checkboxes
    id: anonymize
    attributes:
      label: 匿名選項
      options:
        - label: 請在收錄前匿名化我的理由原文(保留標註欄位,遮蔽自由文字)。
  - type: textarea
    id: trace
    attributes:
      label: 軌痕 JSON
      description: 把遊戲結局頁下載的 cos-trace JSON 檔內容完整貼在這裡。
      render: json
    validations:
      required: true
  - type: textarea
    id: note
    attributes:
      label: 想對作者說的話(選填)
      description: 玩起來的感覺、卡住的地方、你希望這座城多記得什麼。
