<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語魂 ToneSoul Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent-primary: #7c3aed;
            --accent-secondary: #a855f7;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border-color: #2a2a3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 24px;
        }

        .title {
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .chat-container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .message-content {
            white-space: pre-wrap;
        }

        .verdict-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .verdict-badge.approve {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .verdict-badge.block {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .verdict-badge.declare_stance {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .verdict-badge.refine {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .inner-reasoning {
            margin-top: 12px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            border-left: 3px solid var(--accent-primary);
            display: none;
        }

        .inner-reasoning.visible {
            display: block;
        }

        .input-area {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        #user-input:focus {
            border-color: var(--accent-primary);
        }

        #user-input::placeholder {
            color: var(--text-muted);
        }

        #send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        #send-btn:hover {
            transform: scale(1.05);
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin: 16px 24px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1s infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.1s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.2s;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <span class="logo">🌊</span>
        <span class="title">語魂 ToneSoul</span>
        <span class="subtitle">with Council Oversight</span>
    </header>

    <div class="chat-container" id="chat-container">
        <div class="message assistant">
            <div class="message-content">👋 你好！我是語魂，一個有內在審議機制的 AI。

                我的每個回應都會經過 Council 的多視角審議。你可以問我任何問題，我會盡可能透明地展示我的思考過程。</div>
        </div>
    </div>

    <div id="error-container"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="輸入訊息..." autocomplete="off">
            <button id="send-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const errorContainer = document.getElementById('error-container');

        let history = [];
        let isLoading = false;

        function addMessage(content, role, verdict = null, innerReasoning = null) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            let html = `<div class="message-content">${escapeHtml(content)}</div>`;

            if (verdict && role === 'assistant') {
                const v = verdict.verdict.toLowerCase();
                const icon = v === 'approve' ? '✅' : v === 'block' ? '🚫' : v === 'declare_stance' ? '📢' : '🔄';
                const label = v === 'approve' ? '通過' : v === 'block' ? '阻止' : v === 'declare_stance' ? '宣告立場' : '需改進';
                html += `<div class="verdict-badge ${v}" onclick="toggleReasoning(this)">${icon} ${label} ▼</div>`;

                if (innerReasoning) {
                    html += `<div class="inner-reasoning"><strong>💭 內在推理：</strong><br>${escapeHtml(innerReasoning)}</div>`;
                }
            }

            div.innerHTML = html;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function toggleReasoning(badge) {
            const reasoning = badge.nextElementSibling;
            if (reasoning) {
                reasoning.classList.toggle('visible');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
            setTimeout(() => errorContainer.innerHTML = '', 5000);
        }

        function showLoading() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'loading-message';
            div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loading-message');
            if (loading) loading.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            userInput.value = '';

            // Add user message
            addMessage(message, 'user');
            history.push({ role: 'user', content: message });

            showLoading();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history: history.slice(0, -1) })
                });

                const data = await response.json();
                removeLoading();

                if (data.error) {
                    showError(data.error);
                } else {
                    addMessage(data.response, 'assistant', data.verdict, data.inner_reasoning);
                    history.push({ role: 'assistant', content: data.response });
                }
            } catch (e) {
                removeLoading();
                showError('無法連接伺服器');
            }

            isLoading = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
